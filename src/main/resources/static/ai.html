<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI 助手（SSE 流式测试）</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, "Microsoft YaHei", Arial, sans-serif; margin: 24px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    input, textarea, button { font-size: 14px; }
    input[type="text"] { width: min(680px, 100%); padding: 8px 10px; }
    textarea { width: min(980px, 100%); height: 360px; padding: 10px; line-height: 1.5; }
    button { padding: 8px 14px; cursor: pointer; }
    .hint { color: #666; font-size: 12px; margin-top: 8px; }
    .ok { color: #1a7f37; }
    .err { color: #b42318; }
    code { background: #f6f8fa; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <h2>AI 助手（SSE 流式测试页）</h2>

  <div class="row">
    <label>
      Token（JWT）：
      <input id="token" type="text" placeholder="粘贴登录后拿到的 JWT（用于 /api/** 鉴权）" />
    </label>
  </div>

  <div class="row" style="margin-top: 12px;">
    <label style="flex: 1;">
      问题：
      <input id="msg" type="text" placeholder="例如：帮我查一下 taskId=1 的任务详情" />
    </label>
    <button id="btn">发送</button>
    <button id="btnStop">停止</button>
    <span id="status" class="hint"></span>
  </div>

  <div style="margin-top: 12px;">
    <textarea id="out" placeholder="这里会实时输出模型返回的 token 流"></textarea>
    <div class="hint">
      后端接口：<code>GET /api/ai/chat/stream?message=...&token=...</code>（兼容浏览器原生 EventSource）
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let es = null;

    function setStatus(text, cls) {
      const el = $("status");
      el.textContent = text || "";
      el.className = "hint " + (cls || "");
    }

    function closeEs() {
      if (es) {
        es.close();
        es = null;
      }
    }

    $("btnStop").addEventListener("click", () => {
      closeEs();
      setStatus("已停止", "");
    });

    $("btn").addEventListener("click", () => {
      closeEs();
      $("out").value = "";

      const token = $("token").value.trim();
      const message = $("msg").value.trim();
      if (!token) {
        setStatus("请先填写 Token", "err");
        return;
      }
      if (!message) {
        setStatus("请先输入问题", "err");
        return;
      }

      const url = `/api/ai/chat/stream?message=${encodeURIComponent(message)}&token=${encodeURIComponent(token)}`;
      setStatus("连接中…", "");
      es = new EventSource(url);

      es.addEventListener("message", (e) => {
        $("out").value += e.data;
      });

      es.addEventListener("done", () => {
        setStatus("完成", "ok");
        closeEs();
      });

      es.addEventListener("error", (e) => {
        // 注意：EventSource 的 error 事件通常拿不到具体 body，这里尽量提示用户去看后端日志/Network
        setStatus("发生错误（可能是401/网络断开/后端异常）", "err");
      });

      setStatus("已连接，等待流式输出…", "");
    });
  </script>
</body>
</html>
