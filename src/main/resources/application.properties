spring.application.name=ccc
spring.datasource.url=jdbc:mysql://localhost:3306/todo_db
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis.configuration.map-underscore-to-camel-case=true
spring.profiles.active=dev
server.port=8081
pagehelper.helper-dialect=mysql
pagehelper.reasonable=true
pagehelper.support-methods-arguments=true
pagehelper.params=count=countSql
mybatis.mapper-locations=classpath:mapper/*.xml
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
aliyun.oss.endpoint=oss-cn-shanghai.aliyuncs.com
aliyun.oss.bucketName=wwwooo
aliyun.oss.accessKeyId=${OSS_ACCESS_KEY_ID}
aliyun.oss.accessKeySecret=${OSS_ACCESS_KEY_SECRET}
# 腾讯云COS配置
tencent.cos.secretId=${COS_ID}
tencent.cos.secretKey=${COS_KEY}
tencent.cos.bucketName=czzz-1412464270
tencent.cos.region=ap-nanjing
tencent.cos.domain=https://czzz-1412464270.cos.ap-nanjing.myqcloud.com
jwt.secret=${JWT_SECRET:ThisIsAVeryLongSecretKeyForHS512SecurityAlgorithmMustBeMoreThan64Characters123456789012}
jwt.access-token-expire=${JWT_ACCESS_EXPIRE:1800}
jwt.refresh-token-expire=${JWT_REFRESH_EXPIRE:604800}
# Redis 配置
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.timeout=3000

# 禁用 Redisson 自动配置，使用手动配置的 RedissonClient
spring.autoconfigure.exclude=org.redisson.spring.starter.RedissonAutoConfigurationV2

# RabbitMQ ??
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/

# Bailian(OpenAI-compatible) config for LangChain4j
# 建议用环境变量注入，避免写死到仓库
bailian.base-url=${BAILIAN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
# 直接复用你已有的 DASHSCOPE_API_KEY 环境变量，不在配置文件里暴露密钥
bailian.api-key=${DASHSCOPE_API_KEY:}
bailian.model=${BAILIAN_MODEL:qwen-plus}