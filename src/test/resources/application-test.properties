spring.application.name=ccc-test

spring.datasource.url=jdbc:mysql://localhost:3306/todo_db
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.main.allow-bean-definition-overriding=true

spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration,\
  org.redisson.spring.starter.RedissonAutoConfigurationV2

spring.rabbitmq.listener.simple.auto-startup=false
spring.data.redis.repositories.enabled=false

server.port=0

tencent.cos.secretId=test-secret-id
tencent.cos.secretKey=test-secret-key
tencent.cos.bucketName=test-bucket
tencent.cos.region=ap-nanjing
tencent.cos.domain=https://test-bucket.cos.test

bailian.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
bailian.api-key=test-api-key
bailian.model=qwen-plus

jwt.secret=TestSecretKeyForHS512SecurityAlgorithmMustBeMoreThan64Characters123456789012345
jwt.expire=7200

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0
spring.data.redis.timeout=3000

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/